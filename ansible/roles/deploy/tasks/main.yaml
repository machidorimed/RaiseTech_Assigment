    # systemd サービス配置
    - name: Create SpringBoot systemd service
      template:
        src: myapp.service.j2
        dest: /etc/systemd/system/myapp.service

    # systemd リロード
    - name: Reload systemd
      command: systemctl daemon-reexec

    - name: Reload systemd daemon
      command: systemctl daemon-reload

    # SpringBoot 自動起動
    - name: Start and enable myapp Service
      systemd:
        name: myapp
        enabled: yes
        state: restarted

    # ポート待機
    - name: Wait for port 8080
      wait_for:
        port: 8080
        delay: 10
        timeout: 60

    # EC2 内部ホストで HTTP レスポンスチェック
    - name: Check application health
      uri:
        url: http://localhost:8080
        status_code: 200
      register: result
      retries: 10
      delay: 5
      until: result.status == 200
