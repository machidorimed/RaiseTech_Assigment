    # systemd サービス配置
    - name: Create SpringBoot systemd service
      template:
        src: myapp.service.j2
        dest: /etc/systemd/system/myapp.service

    # SpringBoot 自動起動
    - name: Start and enable myapp Service
      systemd:
        name: myapp
        enabled: yes
        state: restarted
        daemon_reload: true

    # service 状態確認
    - name: Check myapp service status
      shell: systemctl status myapp --no-pager
      register: myapp_status

    - debug:
        var: myapp_status.stdout_lines

    # journalctl ログ確認
    - name: Show myapp logs
      shell: journalctl -u myapp -n 50 --no-pager
      register: myapp_logs

    - debug:
        var: myapp_logs.stdout_lines

    # Javaプロセス確認
    - name: Check Java process
      shell: ps -ef | grep java | grep -v grep
      register: java_process

    - debug:
        var: java_process.stdout_lines    

