    # アプリケーションインストール
    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes

    # application.properties を templates に書き換え
    - name: Replace application.properties
      template:
        src: application.properties.j2
        dest: "{{ app_dir }}/src/main/resources/application.properties"
        owner: ec2-user
        group: ec2-user
        mode: '0644'
    
    - name: Copy init.sql
      template:
        src: init.sql.j2
        dest: /tmp/init.sql

    # データベース内に必要な値を入力
    - name: Initialize database
      shell: >
        mysql \
        -h {{ rds_endpoint }} \
        -u {{ db_username }} \
        -p'{{ db_password }}' 
        < /tmp/init.sql

    # 必要な権限を付与
    - name: Make gradlew executable
      file:
        path: "{{ app_dir }}/gradlew"
        mode: '0755'

    - name: Build with Gradle
      shell: ./gradlew build --no-daemon
      args:
        chdir: "{{ app_dir }}"
      async: 600
      poll: 0  
    