name: Terraform CI/CD

on:
  # .tf もしくは .tfvars 、 .tftest .yamlファイル変更時のみ。
  pull_request:
    paths:
      - 'modules/**/*.tf'
      - 'envs/**/*.tf'
      - 'envs/**/*.tfvars'
      - 'envs/**/*.tftest.hcl'
      - '.github/workflows/*.yaml'

  push:
    branches: [main]
    paths:
      - 'modules/**/*.tf'
      - 'envs/**/*.tf'
      - 'envs/**/*.tfvars'
      - 'envs/**/*.tftest.hcl'
      - '.github/workflows/*.yaml'
jobs:
  # ------------------------------------------------------------#
  # Test for stage when submitting a pull request
  # ------------------------------------------------------------#
  terraform-stage-plan:
    # プルリクエスト時、stage環境で test と plan 実行
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/stage

    env:
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    permissions:
      id-token: write
      contents: read  

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1    

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform test
      - run: terraform plan

  # ------------------------------------------------------------#
  # Apply for stage when the request is marged
  # ------------------------------------------------------------#
  terraform-stage-apply:
    # マージされた時、stage環境をデプロイ
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/stage

    outputs:
      instance_id: ${{ steps.tf-output.outputs.instance_id }}    

    env:
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    permissions:
      id-token: write
      contents: read  

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1    
    
      - run: terraform init
      - run: terraform apply -auto-approve

      - name: Get instance ID
        id: tf-output
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

  ansible-stage:
    needs: terraform-stage-apply  
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/stage

    env:
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}
      EC2_INSTANCE_ID: ${{ needs.terraform-stage-apply.outputs.instance_id }}

    permissions:
      id-token: write
      contents: read  

    steps:    
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
      
      # SSM接続用 API & SDK インストール
      - name: Install dependencies
        run: |
          pipx inject ansible-core boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Install session manager plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Create inventory
        run: |
          echo "[web]" > inventory
          echo "$EC2_INSTANCE_ID ansible_connection=aws_ssm ansible_user=ec2-user" >> inventory

      - name: Run Ansible
        run: |
          ansible-playbook -i inventory ../../ansible/playbook.yaml

  # ------------------------------------------------------------#
  # Test for prod when request is marged
  # ------------------------------------------------------------#
  terraform-prod-plan:
    # マージされた時、prod環境で test と plan 実行
    # stage環境 apply 後
    needs: ansible-stage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/prod

    env:
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    permissions:
      id-token: write
      contents: read    

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1        

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform test
      - run: terraform plan

  # ------------------------------------------------------------#
  # Apply for prod after approval
  # ------------------------------------------------------------#
  terraform-prod-apply:
    # stage環境が問題なく動くのを確認し、手動で承認後prod環境をデプロイ
    # prod環境 plan 後
    needs: terraform-prod-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # 手動承認
    environment: prod

    defaults:
      run:
        working-directory: envs/prod

    env:
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    permissions:
      id-token: write
      contents: read  

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1           

      - run: terraform init
      - run: terraform apply -auto-approve