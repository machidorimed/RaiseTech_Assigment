name: Terraform CI/CD

on:
  # .tf もしくは .tfvars 、 .tftest .yamlファイル変更時のみ。
  pull_request:
    paths:
      - 'modules/**/*.tf'
      - 'envs/**/*.tf'
      - 'envs/**/*.tfvars'
      - 'envs/**/*.tftest.hcl'
      - '.github/workflows/*.yaml'

  push:
    branches: [main]
    paths:
      - 'modules/**/*.tf'
      - 'envs/**/*.tf'
      - 'envs/**/*.tfvars'
      - 'envs/**/*.tftest.hcl'
      - '.github/workflows/*.yaml'
jobs:
  # ------------------------------------------------------------#
  # Test for stage when submitting a pull request
  # ------------------------------------------------------------#
  terraform-stage-plan:
    # プルリクエスト時、stage環境で test と plan 実行
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/stage

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform test
      - run: terraform plan

  # ------------------------------------------------------------#
  # Apply for stage when the request is marged
  # ------------------------------------------------------------#
  terraform-stage-apply:
    # マージされた時、stage環境をデプロイ
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/stage

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - run: terraform init
      # - run: terraform apply -auto-approve

  # ------------------------------------------------------------#
  # Test for prod when request is marged
  # ------------------------------------------------------------#
  terraform-prod-plan:
    # マージされた時、prod環境で test と plan 実行
    # stage環境 apply 後
    needs: terraform-stage-apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/prod

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform test
      - run: terraform plan

  # ------------------------------------------------------------#
  # Apply for prod after approval
  # ------------------------------------------------------------#
  terraform-prod-apply:
    # stage環境が問題なく動くのを確認し、手動で承認後prod環境をデプロイ
    # prod環境 plan 後
    needs: terraform-prod-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # 手動承認
    environment: prod

    defaults:
      run:
        working-directory: envs/prod

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-1
      TF_VAR_database_master_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_my_email: ${{ secrets.MY_EMAIL }}

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - run: terraform init
      # - run: terraform apply -auto-approve